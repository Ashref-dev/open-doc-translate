services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-translate
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-qwen/qwen3.6-plus-preview:free}
      - MAX_FILE_SIZE_MB=10
      - MAX_PAGES=5
